<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
      <script src="https://kit.fontawesome.com/11f26d1709.js" crossorigin="anonymous"></script>
    <title>Bootstrap</title>
    <style>
        body{
            background-color: rgb(226, 226, 226);
        }
    </style>
</head>
<body>

    <br>

    <button class="btn btn-primary">Botão</button>
    <button class="btn btn-warning">Botão</button>
    <button class="btn btn-link">Botão</button>

    <br><br>

    <!-- Exemplo de botão com a tag <a> -->
    <a class="btn btn-warning" href="../aula02/index.html">Aula 02</a>

    <br><br>

    <!-- Botão sem cor mas com contorno -->
    <button class="btn btn-outline-primary">Botão</button>

    <br><br>

    <!-- Podemos também alterar os tamanhos dos botões usando nas classes sm para small e lg para large -->
    <button class="btn btn-primary btn-lg">Botão</button>
    <button class="btn btn-primary btn-sm">Botão</button>

    <br><br>

    <!-- Botão que cobre a tela interia horizontalmente mantendo a altura vertical dos demais -->
    <button class="btn btn-primary btn-block">Botão de cobertura horizontal</button>

    <br><br>

    <!-- Botão suspenso dropdown -->
    <div class="dropdown">
    <button class="btn btn-primary" data-toggle="dropdown">
        Menú desdobrável
    </button>
    <div class="dropdown-menu">
        <a href="#" class="dropdown-item">Ítem um</a>
        <a href="#" class="dropdown-item">Ítem dois</a>
        <a href="#" class="dropdown-item">Ítem tres</a>
    </div>
    </div>

    <br><br>

    <div class="btn-group">
        <button class="btn-primary">Um</button>
        <button class="btn-primary">Dois</button>
        <button class="btn-primary">Três</button>
    </div>

    <br><br>


    <div class="btn-group-vertical">
        <button class="btn-primary">Um</button>
        <button class="btn-primary">Dois</button>
        <button class="btn-primary">Três</button>
    </div>

    <br><br>



    

    


    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>
</body>
</html>
