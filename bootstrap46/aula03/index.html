    <a class="btn btn-warning" href="../aula02/index.html">Aula 02</a>

    <button class="btn btn-outline-primary">Botão</button>

    </div>

    <br><br>


    <div class="btn-group-vertical">
        <button class="btn-primary">Um</button>
